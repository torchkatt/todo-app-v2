<!DOCTYPE html>
<html lang="es-CO">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#7c3aed" />
  <title>Sin conexión — Todo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #faf9f7;
      color: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .card {
      text-align: center;
      max-width: 400px;
    }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; }
    h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.75rem; color: #0f172a; }
    p { color: #64748b; margin-bottom: 1.5rem; line-height: 1.6; }
    button {
      background: #7c3aed;
      color: white;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 0.75rem;
      font-weight: 700;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover { background: #6d28d9; transform: scale(1.02); }
    button:active { transform: scale(0.98); }
    @media (prefers-color-scheme: dark) {
      body { background: #0f172a; color: #f1f5f9; }
      h1 { color: #f1f5f9; }
      p { color: #94a3b8; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Sin conexión</h1>
    <p>
      Parece que no tienes conexión a internet. Algunas funciones pueden no estar
      disponibles hasta que vuelvas a conectarte.
    </p>
    <button onclick="location.reload()">Reintentar</button>
  </div>
</body>
</html>
